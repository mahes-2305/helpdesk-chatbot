<!DOCTYPE html>
<html>
<head>
<title>CipherBot AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    background: linear-gradient(-45deg, #141e30, #243b55, #1f2937, #0f2027);
    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.chat-container {
    width: 500px;
    height: 600px;
    border-radius: 20px;
    backdrop-filter: blur(20px);
    background: rgba(31, 41, 55, 0.6);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    animation: scaleIn 0.5s ease;
}
.chat-header {
    padding:15px;
    background:#111827;
    color:white;
    text-align:center;
}
.chat-body {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.chat-footer {
    padding:10px;
    display:flex;
    background:#111827;
}
.chat-footer input {
    flex:1;
    border-radius:20px;
    border:none;
    padding:10px;
}
.chat-footer button {
    margin-left:10px;
    border-radius:20px;
}
.typing {
    font-size:12px;
    color:#9ca3af;
}
.feedback-btn {
    margin-right:5px;
}

/* Message animation */
.message {
    max-width: 70%;
    padding: 12px 18px;
    border-radius: 20px;
    margin-bottom: 12px;
    word-wrap: break-word;
    @keyframes slideFadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.message {
    animation: slideFadeIn 0.35s ease forwards;
}
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg,#3b82f6,#06b6d4);
    color: white;
    border-bottom-right-radius: 5px;
}

.bot {
    align-self: flex-start;
    background: rgba(255,255,255,0.08);
    color: white;
    border-bottom-left-radius: 5px;
}

.typing {
    font-size: 13px;
    color: #9ca3af;
}

.dots span {
    animation: blink 1.4s infinite both;
}

.dots span:nth-child(2) {
    animation-delay: 0.2s;
}

.dots span:nth-child(3) {
    animation-delay: 0.4s;
}

@keyframes blink {
    0% { opacity: 0.2; }
    20% { opacity: 1; }
    100% { opacity: 0.2; }
}

.chat-container {
    animation: scaleIn 0.5s ease;
}

@keyframes scaleIn {
    from {
        transform: scale(0.95);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.ai-response {
    box-shadow: 0 0 15px rgba(59,130,246,0.5);
    animation: glowFade 1.5s ease;
}

@keyframes glowFade {
    0% { box-shadow: 0 0 25px rgba(59,130,246,0.9); }
    100% { box-shadow: 0 0 15px rgba(59,130,246,0.3); }
}

.chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.chat-body::-webkit-scrollbar {
    width: 6px;
}

.chat-body::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header d-flex justify-content-between align-items-center">
<div>
<strong>CipherBot AI</strong><br>
<small>College Helpdesk Assistant</small>
</div>
<div>
    <a href="/login" class="btn btn-outline-light btn-sm me-2">Admin Login</a>
    <a href="/student_logout" class="btn btn-danger btn-sm">Logout</a>
</div>
</div>

<div id="chatBody" class="chat-body"></div>

<div class="chat-footer">
<input id="msg" placeholder="Ask me anything...">
<button class="btn btn-primary" onclick="send()">Send</button>
</div>

</div>

<script>
function send(){
    let msg = document.getElementById("msg").value;
    if(!msg) return;

    let chatBody = document.getElementById("chatBody");

    chatBody.innerHTML += `<div class="message user">${msg}</div>`;
    chatBody.innerHTML += `
<div class="typing">
    CiperBot is typing
    <span class="dots">
        <span>.</span><span>.</span><span>.</span>
    </span>
</div>`;
    chatBody.scrollTop = chatBody.scrollHeight;

    fetch("/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:msg})
    })
    .then(res=>res.json())
    .then(data=>{
        const typingElement = document.querySelector(".typing");
if (typingElement) typingElement.remove();

        let botDiv = document.createElement("div");
botDiv.className = "message bot ai-response";
chatBody.appendChild(botDiv);

let fullText = data.response;
let i = 0;

function typeEffect() {
    if (i < fullText.length) {
        botDiv.innerHTML += fullText.charAt(i);
        i++;
        setTimeout(typeEffect, 15);
    } else {
        botDiv.innerHTML += `<br><small>Confidence: ${data.confidence}%</small>
        <div id="feedback-${data.log_id}" class="mt-2">
            <button class="btn btn-sm btn-success feedback-btn"
                onclick="sendFeedback(${data.log_id}, 'helpful', this)">👍</button>
            <button class="btn btn-sm btn-danger feedback-btn"
                onclick="sendFeedback(${data.log_id}, 'not_helpful', this)">👎</button>
        </div>`;
    }
}

typeEffect();

chatBody.scrollTo({
    top: chatBody.scrollHeight,
    behavior: "smooth"
});
    });

    document.getElementById("msg").value="";
}


document.getElementById("msg").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        send();
    }
});

function sendFeedback(logId, type, buttonElement){
    fetch("/feedback",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            log_id: logId,
            type: type
        })
    });

    const parent = buttonElement.closest(".message");
    const buttons = parent.querySelectorAll("button");

    buttons.forEach(btn => {
        btn.style.opacity = "0";
        btn.style.transition = "opacity 0.3s ease";
    });

    setTimeout(() => {
        buttons.forEach(btn => btn.remove());
    }, 300);
}




</script>

</body>
</html>
